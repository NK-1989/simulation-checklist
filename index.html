<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>シミュレーション チェックリスト</title>
<style>
  :root {
    --primary: #1a73e8;
    --primary-dark: #1557b0;
    --success: #34a853;
    --bg: #f0f4ff;
    --card: #ffffff;
    --text: #202124;
    --muted: #5f6368;
    --border: #dadce0;
    --radius: 14px;
    --shadow: 0 2px 10px rgba(0,0,0,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 40px;
  }

  header {
    background: linear-gradient(135deg, #1a73e8, #0d47a1);
    color: #fff;
    padding: 28px 20px 24px;
    text-align: center;
  }
  header .icon {
    font-size: 36px;
    margin-bottom: 8px;
    display: block;
  }
  header h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  header p {
    font-size: 13px;
    opacity: 0.82;
    margin-top: 6px;
  }

  .container {
    max-width: 600px;
    margin: 0 auto;
    padding: 16px 14px;
  }

  .section-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin: 20px 0 10px 4px;
  }

  /* シナリオカード */
  .scenario-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 14px;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    display: block;
    transition: transform 0.15s, box-shadow 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .scenario-card:active {
    transform: scale(0.98);
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }
  .scenario-card.disabled {
    opacity: 0.55;
    pointer-events: none;
  }

  .card-accent {
    height: 5px;
    background: linear-gradient(90deg, #1a73e8, #4fc3f7);
  }
  .card-accent.red    { background: linear-gradient(90deg, #ea4335, #ff7043); }
  .card-accent.green  { background: linear-gradient(90deg, #34a853, #69f0ae); }
  .card-accent.purple { background: linear-gradient(90deg, #7b1fa2, #ce93d8); }
  .card-accent.orange { background: linear-gradient(90deg, #f57c00, #ffd54f); }

  .card-body {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .card-num {
    font-size: 28px;
    font-weight: 800;
    color: #e8f0fe;
    background: #1a73e8;
    border-radius: 10px;
    width: 48px;
    height: 48px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .card-num.red    { background: #ea4335; }
  .card-num.green  { background: #34a853; }
  .card-num.purple { background: #7b1fa2; }
  .card-num.orange { background: #f57c00; }

  .card-info { flex: 1; min-width: 0; }
  .card-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 3px;
  }
  .card-desc {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 7px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .tag {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
    background: #e8f0fe;
    color: #1557b0;
  }
  .tag.red    { background: #fce8e6; color: #c62828; }
  .tag.green  { background: #e6f4ea; color: #1b5e20; }
  .tag.orange { background: #fff3e0; color: #e65100; }
  .tag.gray   { background: #f1f3f4; color: #5f6368; }

  .card-arrow {
    font-size: 20px;
    color: var(--border);
    flex-shrink: 0;
  }

  /* 準備中カード */
  .coming-soon {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 14px;
    overflow: hidden;
    opacity: 0.5;
  }
  .coming-soon .card-body { cursor: default; }
  .coming-badge {
    font-size: 10px;
    font-weight: 700;
    background: var(--border);
    color: var(--muted);
    padding: 2px 8px;
    border-radius: 10px;
  }

  footer {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    margin-top: 24px;
  }
</style>
</head>
<body>

<header>
  <span class="icon">🏥</span>
  <h1>シミュレーション チェックリスト</h1>
  <p>シナリオを選んでください</p>
</header>

<div class="container">

  <div class="section-label">小児救急</div>

  <!-- シナリオ01 -->
  <a class="scenario-card" href="scenario_01.html">
    <div class="card-accent red"></div>
    <div class="card-body">
      <div class="card-num red">1</div>
      <div class="card-info">
        <div class="card-title">院外心停止（目撃あり）</div>
        <div class="card-desc">1歳0か月 男児 10kg ／ CPA → ROSC</div>
        <div class="card-tags">
          <span class="tag red">心停止</span>
          <span class="tag orange">乳児</span>
          <span class="tag">PALS</span>
          <span class="tag green">ROSC</span>
        </div>
      </div>
      <div class="card-arrow">›</div>
    </div>
  </a>

  <!-- 準備中 -->
  <div class="coming-soon">
    <div class="card-accent"></div>
    <div class="card-body">
      <div class="card-num">2</div>
      <div class="card-info">
        <div class="card-title" style="color:var(--muted)">次のシナリオ</div>
        <div class="card-desc">準備中...</div>
        <div class="card-tags">
          <span class="coming-badge">COMING SOON</span>
        </div>
      </div>
      <div class="card-arrow">›</div>
    </div>
  </div>

</div>

<footer>タップしてシナリオを開始</footer>

</body>
</html>
